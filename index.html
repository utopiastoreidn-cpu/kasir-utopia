<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utopia POS - Pro Printer & History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .font-receipt { font-family: 'Courier Prime', monospace; color: black; }
        .struk-canvas { width: 300px; background: white; padding: 20px 15px; border-radius: 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .line { border-top: 1px dashed black; margin: 5px 0; }
        .service-card { transition: all 0.2s; cursor: pointer; border: 1px solid #1e293b; }
        .history-card { background: #0f172a; border: 1px solid #1e293b; padding: 12px; border-radius: 12px; margin-bottom: 8px; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800">
                <h1 class="text-xl font-black text-blue-500 italic">UTOPIA STORE</h1>
                <p class="text-[10px] text-slate-500 tracking-widest uppercase">Transaction Center [cite: 1]</p>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div onclick="selectService('TRANSFER')" class="service-card bg-blue-600 p-4 rounded-xl text-center text-xs font-bold">TRANSFER/E-WAL [cite: 3]</div>
                <div onclick="selectService('TARIK TUNAI')" class="service-card bg-emerald-600 p-4 rounded-xl text-center text-xs font-bold">SETOR/TARIK [cite: 5]</div>
            </div>

            <div id="form-container" class="bg-slate-900 p-6 rounded-2xl hidden space-y-4 border border-slate-800">
                <h3 id="form-title" class="font-bold text-blue-400 uppercase text-sm"></h3>
                <select id="sub-layanan" oninput="renderStruk()" class="w-full bg-slate-800 p-3 rounded-xl outline-none text-white"></select>
                <input type="text" id="rek" placeholder="No. Rekening/Tujuan" oninput="renderStruk()" class="w-full bg-slate-800 p-3 rounded-xl outline-none text-white">
                <input type="text" id="nama" placeholder="Nama Pelanggan" oninput="renderStruk()" class="w-full bg-slate-800 p-3 rounded-xl outline-none text-white uppercase">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="nominal" placeholder="Nominal" oninput="handleNominalChange()" class="bg-slate-800 p-3 rounded-xl outline-none font-bold text-blue-400">
                    <input type="number" id="admin" placeholder="Admin" oninput="renderStruk()" class="bg-slate-800 p-3 rounded-xl outline-none text-slate-400">
                </div>
                <input type="number" id="bayar" placeholder="Uang Tunai" oninput="renderStruk()" class="w-full bg-slate-800 p-3 rounded-xl text-emerald-400 font-bold text-xl outline-none">
                <button onclick="printBluetooth()" id="btn-print" class="w-full bg-blue-600 py-4 rounded-xl font-black hover:bg-blue-500 transition-all text-white">CETAK STRUK</button>
            </div>
        </div>

        <div class="lg:col-span-4 flex flex-col items-center">
            <h2 class="text-xs font-bold text-slate-500 mb-4 uppercase tracking-widest">Live Preview</h2>
            <div id="receipt" class="struk-canvas font-receipt text-[12px]">
                <div class="text-center">
                    <div class="font-bold text-[16px]">UTOPIA STORE [cite: 1]</div>
                    <div class="text-[9px]">PT. Utopia Digital Technology [cite: 18]</div>
                </div>
                <div class="line mt-4"></div>
                <div class="flex justify-between text-[10px]">
                    <span id="st-tgl">--/--/--</span>
                    <span id="st-jam">00:00</span>
                </div>
                <div class="text-[10px]">REF: <span id="st-ref">TRX00000000</span></div>
                <div class="line"></div>
                <div class="space-y-1 my-2 uppercase">
                    <div class="flex justify-between"><span>Produk</span><span id="st-produk">-</span></div>
                    <div class="flex justify-between"><span>Tujuan</span><span id="st-rek" class="max-w-[150px] truncate text-right">-</span></div>
                    <div class="flex justify-between"><span>Nama</span><span id="st-nama">-</span></div>
                </div>
                <div class="line"></div>
                <div id="price-section" class="space-y-1"></div>
                <div class="line mt-4"></div>
                <div class="text-center text-[10px]">
                    <p class="font-bold">STATUS: BERHASIL</p>
                    <p>BUKTI PEMBAYARAN SAH</p>
                    <p>TERIMA KASIH</p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4 space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest">History Transaksi</h2>
                <button onclick="clearHistory()" class="text-[10px] text-red-500 hover:underline">Hapus Semua</button>
            </div>
            <div id="history-list" class="max-h-[600px] overflow-y-auto pr-2 space-y-2"></div>
        </div>
    </div>

    <script>
        let currentType = '';
        
        // Aturan Admin dari LIST.pdf 
        const ADMIN_RULES = {
            'TRANSFER': [
                { max: 50000, fee: 3000 }, [cite: 2]
                { max: 500000, fee: 5000 }, [cite: 2]
                { max: 1000000, fee: 10000 }, [cite: 2]
                { max: 1500000, fee: 15000 }, [cite: 2]
                { max: 2000000, fee: 20000 } [cite: 2]
            ],
            'TARIK TUNAI': [
                { max: 500000, fee: 10000 }, [cite: 5]
                { max: 1000000, fee: 15000 }, [cite: 5]
                { max: 1500000, fee: 20000 }, [cite: 5]
                { max: 2000000, fee: 25000 } [cite: 5]
            ]
        };

        const SUB_SERVICES = {
            'TRANSFER': ['BRI', 'BCA', 'BNI', 'MANDIRI', 'DANA', 'GOPAY', 'OVO', 'SHOPEEPAY'], [cite: 3]
            'TARIK TUNAI': ['TARIK TUNAI', 'SETOR TUNAI'] [cite: 5]
        };

        function selectService(type) {
            currentType = type;
            document.getElementById('form-container').classList.remove('hidden');
            document.getElementById('form-title').innerText = type;
            document.getElementById('sub-layanan').innerHTML = SUB_SERVICES[type].map(s => `<option value="${s}">${s}</option>`).join('');
            if(document.getElementById('st-ref').innerText === 'TRX00000000') genRef();
            renderStruk();
        }

        function handleNominalChange() {
            const nom = parseInt(document.getElementById('nominal').value) || 0;
            let fee = 0;
            if (currentType && ADMIN_RULES[currentType]) {
                const rules = ADMIN_RULES[currentType];
                const rule = rules.find(r => nom <= r.max);
                fee = rule ? rule.fee : rules[rules.length - 1].fee;
            }
            document.getElementById('admin').value = fee;
            renderStruk();
        }

        function fmt(n) { return new Intl.NumberFormat('id-ID').format(n); }
        function genRef() { document.getElementById('st-ref').innerText = 'TRX' + Date.now().toString().slice(-8); }

        function renderStruk() {
            const nom = parseInt(document.getElementById('nominal').value) || 0;
            const adm = parseInt(document.getElementById('admin').value) || 0;
            const byr = parseInt(document.getElementById('bayar').value) || 0;
            const tot = nom + adm;

            document.getElementById('st-tgl').innerText = new Date().toLocaleDateString('id-ID');
            document.getElementById('st-jam').innerText = new Date().toLocaleTimeString('id-ID');
            document.getElementById('st-produk').innerText = document.getElementById('sub-layanan').value;
            document.getElementById('st-rek').innerText = document.getElementById('rek').value || '-';
            document.getElementById('st-nama').innerText = (document.getElementById('nama').value || '-').toUpperCase();
            
            document.getElementById('price-section').innerHTML = `
                ${renderPriceRow("NOMINAL", nom)}
                ${renderPriceRow("ADMIN", adm)}
                <div class="line"></div>
                ${renderPriceRow("TOTAL", tot, true)}
                ${renderPriceRow("BAYAR", byr, false, "text-slate-500 italic")}
                ${renderPriceRow("KEMBALI", Math.max(0, byr - tot), true, "italic")}
            `;
        }

        function renderPriceRow(label, val, bold = false, extraClass = "") {
            return `<div class="flex justify-between ${bold ? 'font-bold' : ''} ${extraClass}"><span class="w-1/2">${label}</span><span class="w-1/6 text-right">Rp</span><span class="w-1/3 text-right">${fmt(val)}</span></div>`;
        }

        function fixPrice(label, val) {
            const w = 32;
            const rp = "Rp";
            const v = fmt(val);
            let line = label;
            let s1 = 17 - label.length;
            line += " ".repeat(s1 > 0 ? s1 : 1) + rp;
            let s2 = w - line.length - v.length;
            return line + " ".repeat(s2 > 0 ? s2 : 1) + v;
        }

        function fixL(l, r) { const w = 32; return l + " ".repeat(Math.max(1, w - l.length - r.length)) + r; }
        function fixC(t) { const w = 32; return " ".repeat(Math.max(0, Math.floor((w - t.length) / 2))) + t; }

        async function printBluetooth() {
            const btn = document.getElementById('btn-print');
            const nom = parseInt(document.getElementById('nominal').value) || 0;
            const adm = parseInt(document.getElementById('admin').value) || 0;
            const byr = parseInt(document.getElementById('bayar').value) || 0;
            const tot = nom + adm;

            // Simpan ke History Sebelum Cetak
            saveToHistory();

            let lines = [
                "\x1B\x40",
                fixC("UTOPIA STORE [cite: 1]"),
                fixC("Prigen, Pasuruan"),
                "--------------------------------",
                fixL(document.getElementById('st-tgl').innerText, document.getElementById('st-jam').innerText),
                "REF: " + document.getElementById('st-ref').innerText,
                "--------------------------------",
                "PRODUK : " + document.getElementById('sub-layanan').value,
                "TUJUAN : " + (document.getElementById('rek').value || '-'),
                "NAMA   : " + (document.getElementById('nama').value || '-').toUpperCase().substring(0, 22),
                "--------------------------------",
                fixPrice("NOMINAL", nom),
                fixPrice("ADMIN", adm),
                "--------------------------------",
                fixPrice("TOTAL", tot),
                fixPrice("BAYAR", byr),
                fixPrice("KEMBALI", Math.max(0, byr - tot)),
                "--------------------------------",
                fixC("STATUS: BERHASIL"),
                "--------------------------------",
                fixC("BUKTI PEMBAYARAN SAH"),
                fixC("TERIMA KASIH"),
                "\n\n\n\n\n"
            ];

            try {
                btn.innerText = "CONNECTING...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }],
                    optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
                const char = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');

                const encoder = new TextEncoder();
                btn.innerText = "PRINTING...";

                for (let line of lines) {
                    let cleanLine = line.replace(/[^\x20-\x7E\n\r\x1B]/g, "") + "\n";
                    await char.writeValue(encoder.encode(cleanLine));
                    await new Promise(r => setTimeout(r, 180));
                }

                btn.innerText = "CETAK STRUK";
                genRef();
                renderStruk();
            } catch (e) {
                btn.innerText = "CETAK STRUK";
                alert("Gagal: " + e.message);
            }
        }

        function saveToHistory() {
            const trx = {
                id: document.getElementById('st-ref').innerText,
                tgl: new Date().toLocaleString('id-ID'),
                produk: document.getElementById('sub-layanan').value,
                total: parseInt(document.getElementById('nominal').value) + parseInt(document.getElementById('admin').value)
            };
            let history = JSON.parse(localStorage.getItem('utopia_history') || '[]');
            history.unshift(trx);
            localStorage.setItem('utopia_history', JSON.stringify(history.slice(0, 50)));
            updateHistoryUI();
        }

        function updateHistoryUI() {
            const history = JSON.parse(localStorage.getItem('utopia_history') || '[]');
            document.getElementById('history-list').innerHTML = history.map(t => `
                <div class="history-card">
                    <div class="flex justify-between text-[9px] text-slate-500"><span>${t.id}</span><span>${t.tgl}</span></div>
                    <div class="flex justify-between font-bold text-xs text-blue-300 mt-1"><span>${t.produk}</span><span>Rp ${fmt(t.total)}</span></div>
                </div>
            `).join('') || '<p class="text-[10px] text-slate-600 italic">Belum ada transaksi</p>';
        }

        function clearHistory() { if(confirm('Hapus riwayat?')) { localStorage.removeItem('utopia_history'); updateHistoryUI(); } }

        setInterval(() => { if(document.getElementById('clock')) document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
        updateHistoryUI();
    </script>
</body>
</html>
