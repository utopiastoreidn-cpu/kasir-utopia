<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utopia POS - Clean Print</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-receipt { font-family: 'Courier Prime', monospace; }
        .struk-canvas {
            width: 300px;
            background: #fff;
            color: #000;
            padding: 20px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-radius: 4px;
        }
        .line { border-top: 1px dashed #000; margin: 5px 0; }
        .flex-between { display: flex; justify-content: space-between; }
        .service-card { transition: all 0.2s ease; cursor: pointer; }
        .service-card:hover { transform: translateY(-3px); filter: brightness(1.1); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-7 space-y-6">
            <div class="flex justify-between items-center bg-slate-900 p-5 rounded-2xl border border-slate-800">
                <h1 class="text-xl font-black text-blue-500">UTOPIA STORE</h1>
                <div id="clock" class="text-lg font-bold">00:00:00</div>
            </div>

            <div class="grid grid-cols-4 gap-3">
                <div onclick="selectService('TRANSFER BANK')" class="service-card bg-blue-600 p-3 rounded-xl text-center text-[10px] font-bold">🏦 BANK</div>
                <div onclick="selectService('E-WALLET')" class="service-card bg-emerald-600 p-3 rounded-xl text-center text-[10px] font-bold">📱 E-WAL</div>
                <div onclick="selectService('LISTRIK')" class="service-card bg-yellow-500 p-3 rounded-xl text-center text-[10px] font-bold text-black">⚡ PLN</div>
                <div onclick="selectService('TAGIHAN')" class="service-card bg-red-600 p-3 rounded-xl text-center text-[10px] font-bold">📜 BILL</div>
            </div>

            <div id="form-container" class="bg-slate-900 p-6 rounded-2xl border border-slate-800 hidden">
                <div class="grid grid-cols-1 gap-4">
                    <select id="sub-layanan" oninput="renderStruk()" class="bg-slate-800 p-3 rounded-xl text-white outline-none"></select>
                    <input type="text" id="rek" placeholder="Nomor Tujuan" oninput="renderStruk()" class="bg-slate-800 p-3 rounded-xl text-white outline-none">
                    <input type="text" id="nama" placeholder="Nama Pelanggan" oninput="renderStruk()" class="bg-slate-800 p-3 rounded-xl text-white outline-none">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="nominal" placeholder="Nominal" oninput="renderStruk()" class="bg-slate-800 p-3 rounded-xl text-white outline-none font-bold">
                        <input type="number" id="admin" value="3000" oninput="renderStruk()" class="bg-slate-800 p-3 rounded-xl text-white outline-none">
                    </div>
                    <input type="number" id="bayar" placeholder="Tunai/Bayar" oninput="renderStruk()" class="bg-slate-800 p-3 rounded-xl text-emerald-400 font-bold text-xl outline-none">
                    <button onclick="printBluetooth()" id="btn-print" class="bg-blue-600 py-4 rounded-xl font-black tracking-widest hover:bg-blue-500 active:scale-95">CETAK STRUK</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5 flex justify-center">
            <div id="receipt" class="struk-canvas font-receipt text-[12px]">
                <div class="text-center">
                    <div class="font-bold text-[16px]">UTOPIA STORE</div>
                    <div class="text-[10px]">Prigen, Pasuruan</div>
                    <div class="text-[10px]">WA: 0812-3456-7890</div>
                </div>
                <div class="line mt-4"></div>
                <div class="flex-between text-[10px]">
                    <span id="st-tgl">00/00/00</span>
                    <span id="st-jam">00:00:00</span>
                </div>
                <div class="text-[10px]">REF: <span id="st-ref">TRX00000000</span></div>
                <div class="line"></div>
                <div class="space-y-1 my-2 uppercase">
                    <div class="flex-between"><span>Produk</span><span id="st-produk">-</span></div>
                    <div class="flex-between"><span>Tujuan</span><span id="st-rek">-</span></div>
                    <div class="flex-between"><span>Nama</span><span id="st-nama">-</span></div>
                </div>
                <div class="line"></div>
                <div class="space-y-1">
                    <div class="flex-between"><span>NOMINAL</span><span id="st-nom">0</span></div>
                    <div class="flex-between"><span>ADMIN</span><span id="st-admin">0</span></div>
                    <div class="line"></div>
                    <div class="flex-between font-bold text-[14px]"><span>TOTAL</span><span id="st-total">0</span></div>
                    <div class="flex-between italic"><span>BAYAR</span><span id="st-bayar">0</span></div>
                    <div class="flex-between italic font-bold"><span>KEMBALI</span><span id="st-kembali">0</span></div>
                </div>
                <div class="line mt-4"></div>
                <div class="text-center text-[10px]">
                    <p>BUKTI PEMBAYARAN SAH</p>
                    <p>TERIMA KASIH</p>
                </div>
                <div class="h-8"></div>
            </div>
        </div>
    </div>

    <script>
        const DATA = {
            'TRANSFER BANK': ['BRI', 'BCA', 'BNI', 'MANDIRI', 'BSI'],
            'E-WALLET': ['DANA', 'GOPAY', 'OVO', 'SHOPEEPAY'],
            'LISTRIK': ['TOKEN PLN', 'PLN PASCA'],
            'TAGIHAN': ['BPJS', 'FIF', 'ADIRA', 'WOM']
        };

        function selectService(t) {
            document.getElementById('form-container').classList.remove('hidden');
            document.getElementById('sub-layanan').innerHTML = DATA[t].map(s => `<option value="${s}">${s}</option>`).join('');
            renderStruk();
        }

        function cleanText(text) {
            // MENGHAPUS SEMUA KARAKTER ANEH & MEMASTIKAN HANYA ASCII
            return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^\x00-\x7F]/g, "");
        }

        function fmtNum(n) {
            return new Intl.NumberFormat('id-ID').format(n);
        }

        function renderStruk() {
            const nom = parseInt(document.getElementById('nominal').value) || 0;
            const adm = parseInt(document.getElementById('admin').value) || 0;
            const byr = parseInt(document.getElementById('bayar').value) || 0;
            const tot = nom + adm;

            document.getElementById('st-tgl').innerText = new Date().toLocaleDateString('id-ID');
            document.getElementById('st-jam').innerText = new Date().toLocaleTimeString('id-ID');
            document.getElementById('st-produk').innerText = document.getElementById('sub-layanan').value;
            document.getElementById('st-rek').innerText = document.getElementById('rek').value || '-';
            document.getElementById('st-nama').innerText = (document.getElementById('nama').value || '-').toUpperCase();
            
            document.getElementById('st-nom').innerText = "Rp " + fmtNum(nom);
            document.getElementById('st-admin').innerText = "Rp " + fmtNum(adm);
            document.getElementById('st-total').innerText = "Rp " + fmtNum(tot);
            document.getElementById('st-bayar').innerText = "Rp " + fmtNum(byr);
            document.getElementById('st-kembali').innerText = "Rp " + fmtNum(Math.max(0, byr - tot));
        }

        function fixL(l, r) {
            let width = 32;
            let spaces = width - l.length - r.length;
            return l + " ".repeat(spaces > 0 ? spaces : 1) + r;
        }

        function fixC(t) {
            let width = 32;
            let spaces = Math.floor((width - t.length) / 2);
            return " ".repeat(spaces > 0 ? spaces : 0) + t;
        }

        async function printBluetooth() {
            const btn = document.getElementById('btn-print');
            const nom = parseInt(document.getElementById('nominal').value) || 0;
            const adm = parseInt(document.getElementById('admin').value) || 0;
            const byr = parseInt(document.getElementById('bayar').value) || 0;
            const tot = nom + adm;

            // BANGUN STRING TANPA KARAKTER KHUSUS (Murni ASCII)
            let p = "\x1B\x40"; // Reset
            p += fixC("UTOPIA STORE") + "\n";
            p += fixC("Prigen, Pasuruan") + "\n";
            p += "--------------------------------\n";
            p += fixL(document.getElementById('st-tgl').innerText, document.getElementById('st-jam').innerText) + "\n";
            p += "REF: " + (document.getElementById('st-ref').innerText) + "\n";
            p += "--------------------------------\n";
            p += "PRODUK : " + document.getElementById('sub-layanan').value + "\n";
            p += "TUJUAN : " + (document.getElementById('rek').value || '-') + "\n";
            p += "NAMA   : " + (document.getElementById('nama').value || '-').toUpperCase().substring(0, 22) + "\n";
            p += "--------------------------------\n";
            p += fixL("NOMINAL", "Rp " + fmtNum(nom)) + "\n";
            p += fixL("ADMIN", "Rp " + fmtNum(adm)) + "\n";
            p += "--------------------------------\n";
            p += fixL("TOTAL", "Rp " + fmtNum(tot)) + "\n";
            p += fixL("BAYAR", "Rp " + fmtNum(byr)) + "\n";
            p += fixL("KEMBALI", "Rp " + fmtNum(Math.max(0, byr - tot))) + "\n";
            p += "--------------------------------\n";
            p += fixC("TERIMA KASIH") + "\n";
            p += "\n\n\n\n\n";

            // BERSIHKAN TOTAL DARI KARAKTER UNICODE SEBELUM KIRIM
            const finalPrint = cleanText(p);

            try {
                btn.innerText = "CONNECTING...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }],
                    optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
                const char = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');

                const encoder = new TextEncoder(); // UTF-8 encoder tapi kita sudah filter ke ASCII
                const data = encoder.encode(finalPrint);
                
                btn.innerText = "PRINTING...";
                for (let i = 0; i < data.length; i += 20) {
                    await char.writeValue(data.slice(i, i + 20));
                    await new Promise(r => setTimeout(r, 70));
                }

                btn.innerText = "CETAK STRUK";
                document.getElementById('st-ref').innerText = 'TRX' + Date.now().toString().slice(-8);
                alert("Sukses!");
            } catch (e) {
                btn.innerText = "CETAK STRUK";
                alert("Gagal: " + e.message);
            }
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
        }, 1000);
    </script>
</body>
</html>
